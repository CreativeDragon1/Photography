name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Firebase config from secrets
        run: |
          printf 'const firebaseConfig = {\n' > js/firebase-config.js
          printf '    apiKey: "%s",\n' "${{ secrets.YOUR_API_KEY }}" >> js/firebase-config.js
          printf '    authDomain: "%s.firebaseapp.com",\n' "${{ secrets.YOUR_PROJECT_ID }}" >> js/firebase-config.js
          printf '    projectId: "%s",\n' "${{ secrets.YOUR_PROJECT_ID }}" >> js/firebase-config.js
          printf '    storageBucket: "%s.firebasestorage.app",\n' "${{ secrets.YOUR_PROJECT_ID }}" >> js/firebase-config.js
          printf '    messagingSenderId: "%s",\n' "${{ secrets.YOUR_SENDER_ID }}" >> js/firebase-config.js
          printf '    appId: "%s"\n' "${{ secrets.YOUR_APP_ID }}" >> js/firebase-config.js
          printf '};\n' >> js/firebase-config.js
          printf 'firebase.initializeApp(firebaseConfig);\n' >> js/firebase-config.js
          printf 'const db = firebase.firestore();\n' >> js/firebase-config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
